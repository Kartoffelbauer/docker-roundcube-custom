name: Keepalive

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  keepalive:
    name: Dynamic API Keepalive Ping
    runs-on: ubuntu-latest

    steps:
      - name: Re-enable Scheduled Workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Strict Bash Execution:
          set -euo pipefail

          echo "Fetching workflow states for repository: ${REPO}..."

          # Consolidates repeating headers into an array to maintain clean code.
          API_ARGS=(
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          # Dynamic Workflow Discovery via GitHub API
          WORKFLOWS=$(gh api \
            "${API_ARGS[@]}" \
            --paginate \
            "/repos/${REPO}/actions/workflows" \
            --jq '.workflows[] | select(.state == "active" or .state == "disabled_inactivity") | "\(.name)|\(.id)"')

          # Handle edge case where no eligible workflows exist
          if [ -z "$WORKFLOWS" ]; then
            echo "No eligible workflows found to refresh."
            exit 0
          fi

          # Parses the formatted string safely without invoking a subshell.
          while IFS='|' read -r name id; do
            echo "=> Pinging enable endpoint for: ${name} (ID: ${id})"

            # Execute REST API call using the internal workflow ID.
            # Injects the DRY API_ARGS array for shared headers.
            gh api \
              "${API_ARGS[@]}" \
              --silent \
              --method PUT \
              "/repos/${REPO}/actions/workflows/${id}/enable"

            echo "   Success: ${name} schedule refreshed."
          done <<< "$WORKFLOWS"

          echo "Keepalive sequence completed successfully."