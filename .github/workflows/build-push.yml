name: Build and Push

on:
  schedule:
    - cron: '0 3 * * 0'
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - 'plugins/**'
  workflow_dispatch:
    inputs:
      force_tag:
        description: 'Force build a specific tag (e.g. 1.6.6-nonroot)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  # --- Job 1: Find Missing Versions ---
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.set_vars.outputs.image_name }}
      matrix_tags: ${{ steps.check.outputs.missing_tags }}
      latest_tag: ${{ steps.check.outputs.latest_tag }}
    steps:
      - name: Calculate lowercase image name
        id: set_vars
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Fetch and Compare Tags
        id: check
        run: |
          # 0. Handle manual force-build trigger
          if [ "${{ github.event.inputs.force_tag }}" != "" ]; then
            echo "Manual override detected. Building only: ${{ github.event.inputs.force_tag }}"
            echo "missing_tags=[\"${{ github.event.inputs.force_tag }}\"]" >> "$GITHUB_OUTPUT"
            # Do not tag forced legacy builds as 'latest-nonroot'
            echo "latest_tag=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 1. Fetch Upstream Tags (Regex ensures only true semantic versions ending in -nonroot)
          UPSTREAM_TAGS=$(skopeo list-tags docker://roundcube/roundcubemail | jq -r '.Tags[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+-nonroot$"))' | sort -V)
          ABSOLUTE_LATEST=$(echo "$UPSTREAM_TAGS" | tail -n 1)

          # 2. Fetch Our GHCR Tags (Using authenticated Skopeo, suppressing errors on first run)
          OUR_TAGS=$(skopeo list-tags docker://${{ env.REGISTRY }}/${{ steps.set_vars.outputs.image_name }} --creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} 2>/dev/null | jq -r '.Tags[]? // empty' | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+-nonroot$")) | sort -V || true)

          MISSING_TAGS=()

          # 3. Apply the Versioning Logic
          if [ -z "$OUR_TAGS" ]; then
            echo "No previous builds found in GHCR. Building initial latest version: $ABSOLUTE_LATEST"
            MISSING_TAGS+=("$ABSOLUTE_LATEST")
          else
            OLDEST_OUR_TAG=$(echo "$OUR_TAGS" | head -n 1)
            echo "Oldest previously built version in GHCR is: $OLDEST_OUR_TAG"

            for tag in $UPSTREAM_TAGS; do
              # Determine if upstream tag is >= our oldest tag
              LOWEST=$(echo -e "$tag\n$OLDEST_OUR_TAG" | sort -V | head -n 1)

              if [ "$LOWEST" == "$OLDEST_OUR_TAG" ]; then
                # Tag is in our valid window. Check if we haven't built it yet.
                if ! echo "$OUR_TAGS" | grep -qx "$tag"; then
                  echo "Queuing missing valid release: $tag"
                  MISSING_TAGS+=("$tag")
                fi
              fi
            done
          fi

          # 4. Handle direct pushes to main (e.g., Dockerfile changes)
          if [ ${#MISSING_TAGS[@]} -eq 0 ]; then
            if [ "${{ github.event_name }}" == "push" ]; then
              echo "Push detected but no new upstream tags. Rebuilding newest tag: $ABSOLUTE_LATEST"
              MISSING_TAGS=("$ABSOLUTE_LATEST")
            else
              echo "No new upstream versions missing. Exiting gracefully."
              echo "missing_tags=[]" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # 5. Export JSON array and the absolute latest tag reference
          JSON_ARRAY=$(printf '%s\n' "${MISSING_TAGS[@]}" | jq -R . | jq -s -c .)
          echo "Final matrix tags: $JSON_ARRAY"
          echo "missing_tags=$JSON_ARRAY" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$ABSOLUTE_LATEST" >> "$GITHUB_OUTPUT"

  # --- Job 2: Matrix Build & Push ---
  build:
    needs: prepare
    if: needs.prepare.outputs.matrix_tags != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        tag: ${{ fromJson(needs.prepare.outputs.matrix_tags) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Minor Version for Tagging
        id: version_logic
        run: |
          # Converts "1.6.6-nonroot" into "1.6-nonroot"
          MINOR=$(echo "${{ matrix.tag }}" | grep -oE '^[0-9]+\.[0-9]+')
          echo "minor_tag=${MINOR}-nonroot" >> "$GITHUB_OUTPUT"

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}
          tags: |
            type=raw,value=${{ matrix.tag }}
            type=raw,value=${{ steps.version_logic.outputs.minor_tag }}
            type=raw,value=latest-nonroot,enable=${{ matrix.tag == needs.prepare.outputs.latest_tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          build-args: |
            UPSTREAM_VERSION=${{ matrix.tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.tag }}