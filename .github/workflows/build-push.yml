name: Build and Push

on:
  schedule:
    - cron: '0 3 * * 0'
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - 'plugins/**'
  workflow_dispatch:
    inputs:
      force_tag:
        description: 'Force build a specific tag (e.g. latest-apache-nonroot)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  # --- Job 1: Find Missing Versions ---
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.set_vars.outputs.image_name }}
      matrix_tags: ${{ steps.check.outputs.missing_tags }}
      latest_tag: ${{ steps.check.outputs.latest_tag }}
    steps:
      - name: Calculate lowercase image name
        id: set_vars
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Fetch and Compare Tags
        id: check
        run: |
          # 0. Handle manual force-build trigger (Input is expected as upstream tag, e.g. 1.6.6-apache-nonroot)
          if [ -n "${{ github.event.inputs.force_tag }}" ]; then
            echo "Manual override detected."
            # Convert upstream input to our downstream naming convention
            DOWNSTREAM_FORCE_TAG=$(echo "${{ github.event.inputs.force_tag }}" | sed 's/-apache-nonroot/-nonroot/')
            echo "Building only: $DOWNSTREAM_FORCE_TAG"

            echo "missing_tags=[\"$DOWNSTREAM_FORCE_TAG\"]" >> "$GITHUB_OUTPUT"
            echo "latest_tag=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 1. Fetch Upstream Tags (Strictly matching x.x.x-apache-nonroot)
          UPSTREAM_TAGS=$(skopeo list-tags docker://roundcube/roundcubemail | jq -r '.Tags[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+-apache-nonroot$"))' | sort -V)

          if [ -z "$UPSTREAM_TAGS" ]; then
            echo "Warning: No 'x.x.x-apache-nonroot' tags found upstream."
            echo "missing_tags=[]" >> "$GITHUB_OUTPUT"
            echo "latest_tag=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. Fetch Our GHCR Tags (Strictly matching our downstream x.x.x-nonroot format)
          OUR_TAGS=$(skopeo list-tags docker://${{ env.REGISTRY }}/${{ steps.set_vars.outputs.image_name }} --creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} 2>/dev/null | jq -r '.Tags[]? // empty | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+-nonroot$"))' | sort -V || true)

          MISSING_TAGS=()

          # Helper function to convert tags safely
          to_downstream() { echo "$1" | sed 's/-apache-nonroot/-nonroot/'; }
          to_upstream() { echo "$1" | sed 's/-nonroot/-apache-nonroot/'; }

          # The absolute latest upstream tag, converted to our format for reference
          ABSOLUTE_LATEST_UPSTREAM=$(echo "$UPSTREAM_TAGS" | tail -n 1)
          ABSOLUTE_LATEST_DOWNSTREAM=$(to_downstream "$ABSOLUTE_LATEST_UPSTREAM")

          # 3. Apply the Versioning Logic
          if [ -z "$OUR_TAGS" ]; then
            echo "No previous builds found in GHCR. Building initial latest version: $ABSOLUTE_LATEST_DOWNSTREAM"
            MISSING_TAGS+=("$ABSOLUTE_LATEST_DOWNSTREAM")
          else
            OLDEST_OUR_TAG=$(echo "$OUR_TAGS" | head -n 1)
            # We must convert our oldest tag BACK to upstream format to compare properly against upstream tags
            OLDEST_UPSTREAM_COMPARISON=$(to_upstream "$OLDEST_OUR_TAG")
            echo "Oldest built version in GHCR is: $OLDEST_OUR_TAG (Upstream equivalent: $OLDEST_UPSTREAM_COMPARISON)"

            for upstream_tag in $UPSTREAM_TAGS; do
              # Determine if upstream tag is >= our oldest tag
              LOWEST=$(echo -e "$upstream_tag\n$OLDEST_UPSTREAM_COMPARISON" | sort -V | head -n 1)

              if [ "$LOWEST" == "$OLDEST_UPSTREAM_COMPARISON" ]; then
                # Tag is in our valid window. Convert to our format and queue if not yet built.
                downstream_tag=$(to_downstream "$upstream_tag")
                if ! echo "$OUR_TAGS" | grep -qx "$downstream_tag"; then
                  echo "Queuing missing valid release: $downstream_tag"
                  MISSING_TAGS+=("$downstream_tag")
                fi
              fi
            done
          fi

          # 4. Handle direct pushes to main / workflow dispatches
          if [ ${#MISSING_TAGS[@]} -eq 0 ]; then
            if [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              echo "Push/Dispatch detected but no new upstream tags. Rebuilding newest tag: $ABSOLUTE_LATEST_DOWNSTREAM"
              MISSING_TAGS=("$ABSOLUTE_LATEST_DOWNSTREAM")
            else
              echo "No new upstream versions missing. Exiting gracefully."
              echo "missing_tags=[]" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # 5. Export JSON array and the absolute latest downstream tag reference
          JSON_ARRAY=$(printf '%s\n' "${MISSING_TAGS[@]}" | jq -R . | jq -s -c .)
          echo "Final matrix tags: $JSON_ARRAY"
          echo "missing_tags=$JSON_ARRAY" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$ABSOLUTE_LATEST_DOWNSTREAM" >> "$GITHUB_OUTPUT"

  # --- Job 2: Matrix Build & Push ---
  build:
    needs: prepare
    if: needs.prepare.outputs.matrix_tags != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        # The matrix tag here is the DOWNSTREAM format (e.g., 1.6.6-nonroot)
        tag: ${{ fromJson(needs.prepare.outputs.matrix_tags) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process Tag Formats
        id: version_logic
        run: |
          # 1. Calculate Minor Tag (Extracts "1.6" from "1.6.6-nonroot")
          MINOR=$(echo "${{ matrix.tag }}" | grep -oE '^[0-9]+\.[0-9]+' || true)
          if [ -z "$MINOR" ]; then
            echo "minor_tag=${{ matrix.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "minor_tag=${MINOR}-nonroot" >> "$GITHUB_OUTPUT"
          fi

          # 2. Calculate Upstream Base Image Argument (Converts "1.6.6-nonroot" back to "1.6.6-apache-nonroot")
          UPSTREAM_BUILD_ARG=$(echo "${{ matrix.tag }}" | sed 's/-nonroot/-apache-nonroot/')
          echo "upstream_arg=$UPSTREAM_BUILD_ARG" >> "$GITHUB_OUTPUT"

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}
          tags: |
            type=raw,value=${{ matrix.tag }}
            type=raw,value=${{ steps.version_logic.outputs.minor_tag }}
            type=raw,value=latest-nonroot,enable=${{ matrix.tag == needs.prepare.outputs.latest_tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          build-args: |
            UPSTREAM_VERSION=${{ steps.version_logic.outputs.upstream_arg }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.tag }}