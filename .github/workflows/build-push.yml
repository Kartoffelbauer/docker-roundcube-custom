name: Build and Push

on:
  schedule:
    - cron: '0 3 * * 0' # Auto-build every Sunday at 03:00 AM
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - 'plugins/**'
  workflow_dispatch: # Allow manual triggering via GitHub UI

env:
  REGISTRY: ghcr.io

jobs:
  # --- Job 1: Preparation & Smart Check ---
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.set_vars.outputs.image_name }}
      skip_build: ${{ steps.check.outputs.skip }}
      upstream_digest: ${{ steps.check.outputs.upstream_digest }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}
    steps:
      - name: Calculate lowercase image name
        id: set_vars
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Check if upstream base image updated
        id: check
        run: |
          UPSTREAM_IMAGE="docker://roundcube/roundcubemail:latest-nonroot"
          OUR_IMAGE="docker://${{ env.REGISTRY }}/${{ steps.set_vars.outputs.image_name }}:latest-nonroot"

          # 1. Get current SHA256 digest of the official upstream image
          UPSTREAM_DIGEST=$(skopeo inspect $UPSTREAM_IMAGE | jq -r '.Digest')

          # 2. Extract the exact Roundcube version from the upstream image config
          UPSTREAM_VERSION=$(skopeo inspect --config $UPSTREAM_IMAGE | jq -r '.config.Env[]? | select(startswith("ROUNDCUBEMAIL_VERSION=")) | split("=")[1]' | head -n 1)
          
          # Fallback to standard OCI label if the env var is missing, or default to "latest"
          if [ -z "$UPSTREAM_VERSION" ]; then
            UPSTREAM_VERSION=$(skopeo inspect $UPSTREAM_IMAGE | jq -r '.Labels["org.opencontainers.image.version"] // "latest"')
          fi
          echo "upstream_version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"

          # 3. Get the label from our last build (fallback to 'none' on first run)
          OUR_DIGEST=$(skopeo inspect --creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} $OUR_IMAGE | jq -r '.Labels["upstream_base_digest"]' || echo "none")

          # 4. Compare digests. Skip only if they match AND it's a scheduled run.
          if [ "$UPSTREAM_DIGEST" = "$OUR_DIGEST" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "No update found upstream. Skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Update found or manual trigger! Building version $UPSTREAM_VERSION..."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "upstream_digest=$UPSTREAM_DIGEST" >> "$GITHUB_OUTPUT"
          fi

  # --- Job 2: Build & Push ---
  build:
    needs: prepare
    if: needs.prepare.outputs.skip_build == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}
          tags: |
            type=raw,value=latest-nonroot
            type=raw,value=${{ needs.prepare.outputs.upstream_version }}-nonroot

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true # Ensures we don't build on top of a stale cached base image
          tags: ${{ steps.meta.outputs.tags }}
          # Attach the upstream digest as a label for future comparison
          labels: |
            ${{ steps.meta.outputs.labels }}
            upstream_base_digest=${{ needs.prepare.outputs.upstream_digest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max