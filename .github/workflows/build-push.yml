name: Build and Push

on:
  schedule:
    - cron: '0 3 * * 0'
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - 'plugins/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.set_vars.outputs.image_name }}
      matrix_tags: ${{ steps.check.outputs.missing_tags }}
      latest_tag: ${{ steps.check.outputs.latest_tag }}
      highest_minors: ${{ steps.check.outputs.highest_minors }}
    steps:
      # GHCR requires image repository names to be strictly lowercase
      - name: Calculate lowercase image name
        id: set_vars
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Calculate build matrix
        id: check
        run: |
          # 1. Fetch Upstream Versions (Extract pure semantic version, e.g., '1.6.6')
          UPSTREAM_VERSIONS=$(skopeo list-tags docker://roundcube/roundcubemail | jq -r '.Tags[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+-apache-nonroot$")) | sub("-apache-nonroot$"; "")' | sort -V)

          if [ -z "$UPSTREAM_VERSIONS" ]; then
            echo "Error: No valid upstream tags found."
            echo "missing_tags=[]" >> "$GITHUB_OUTPUT"
            echo "highest_minors=[]" >> "$GITHUB_OUTPUT"
            echo "latest_tag=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ABSOLUTE_LATEST=$(echo "$UPSTREAM_VERSIONS" | tail -n 1)

          # Calculate highest patch for each minor version to prevent tag race conditions
          # e.g., Reads [1.6.0, 1.6.1, 1.6.2] -> Outputs [1.6.2]
          HIGHEST_MINORS=$(echo "$UPSTREAM_VERSIONS" | awk -F. '{minor=$1"."$2; map[minor]=$0} END {for (i in map) print map[i]}' | sort -V)
          HIGHEST_MINORS_JSON=$(printf '%s\n' $HIGHEST_MINORS | jq -R . | jq -s -c .)

          # 2. Fetch Local Versions (Suppressing errors on first run)
          OUR_VERSIONS=$(skopeo list-tags docker://${{ env.REGISTRY }}/${{ steps.set_vars.outputs.image_name }} --creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} 2>/dev/null | jq -r '.Tags[]? // empty | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+-nonroot$")) | sub("-nonroot$"; "")' | sort -V || true)

          MISSING_VERSIONS=()

          # 3. Calculate the Difference (1:1 Mirror logic)
          for up_ver in $UPSTREAM_VERSIONS; do
            if ! echo "$OUR_VERSIONS" | grep -qx "$up_ver"; then
              MISSING_VERSIONS+=("$up_ver")
            fi
          done

          # 4. Handle Codebase Updates
          # Only force a rebuild if code was actually pushed to main.
          if [ ${#MISSING_VERSIONS[@]} -eq 0 ]; then
            if [ "${{ github.event_name }}" == "push" ]; then
              echo "Codebase update detected. Rebuilding the highest patch of every minor release."
              # Converts the newline-separated string into a bash array
              MISSING_VERSIONS=($HIGHEST_MINORS)
            else
              echo "Repository is perfectly synced. Exiting gracefully."
              echo "missing_tags=[]" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # 5. Export variables to the matrix
          JSON_ARRAY=$(printf '%s\n' "${MISSING_VERSIONS[@]}" | jq -R . | jq -s -c .)
          echo "missing_tags=$JSON_ARRAY" >> "$GITHUB_OUTPUT"
          echo "highest_minors=$HIGHEST_MINORS_JSON" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$ABSOLUTE_LATEST" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.matrix_tags != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        version: ${{ fromJson(needs.prepare.outputs.matrix_tags) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract minor version for tagging
        id: version_logic
        run: |
          MINOR=$(echo "${{ matrix.version }}" | grep -oE '^[0-9]+\.[0-9]+' || true)
          if [ -z "$MINOR" ]; then
            echo "minor=${{ matrix.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Apply local suffix formatting with race-condition protection
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}
          tags: |
            type=raw,value=${{ matrix.version }}-nonroot
            type=raw,value=${{ steps.version_logic.outputs.minor }}-nonroot,enable=${{ contains(fromJson(needs.prepare.outputs.highest_minors), matrix.version) }}
            type=raw,value=latest-nonroot,enable=${{ matrix.version == needs.prepare.outputs.latest_tag }}

      # Inject the upstream suffix for the FROM instruction
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          build-args: |
            UPSTREAM_VERSION=${{ matrix.version }}-apache-nonroot
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.version }}